- name: Vérifier si k3s est déjà installé
  stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Télécharger et installer k3s (control plane)
  shell: curl -sfL https://get.k3s.io | sh -
  when: not k3s_bin.stat.exists

- name: S'assurer que k3s est démarré et activé
  systemd:
    name: k3s
    enabled: yes
    state: started

- name: Attendre que le noeud master soit prêt
  shell: kubectl get nodes
  register: result
  until: result.stdout.find("Ready") != -1
  retries: 15
  delay: 10

- name: Récupérer le token de jonction du cluster
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token

- name: Exposer le token pour les workers
  set_fact:
    k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"
